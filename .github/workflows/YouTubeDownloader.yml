name: 🎯 YouTube Downloader

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '🔄 Download Mode'
        required: true
        type: choice
        options:
          - single
          - playlist
          - channel
          - search
        default: 'single'
      url:
        description: '🎬 URL or Search Query or channel name (@ChannelName or ChannelName)'
        required: true
        type: string
      type:
        description: '📦 Output Type'
        required: true
        type: choice
        options:
          - video
          - audio
        default: 'video'
      quality:
        description: 'Quality (video: 144/360/480/720/1080 | audio: 128/192/320)'
        required: false
        type: string
        default: '720'
      max_videos:
        description: '🔢 Max results'
        required: false
        type: number
        default: 10
      split_threshold_mb:
        description: '📦 Split > MB (0=no)'
        required: false
        type: number
        default: 50

env:
  PYTHONUNBUFFERED: '1'
  DEBIAN_FRONTEND: 'noninteractive'

jobs:
  download-and-process:
    name: 🚀 YouTube Downloader
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}

      - name: ⚡ Setup
        run: |
          python3 -c "import requests" 2>/dev/null || pip3 install -q requests
          command -v yt-dlp &>/dev/null || pip3 install -q yt-dlp
          command -v zip &>/dev/null || (sudo apt-get update -qq && sudo apt-get install -y -qq zip)

      - name: 🔗 Prepare
        id: prep
        run: |
          M="${{ github.event.inputs.mode }}"
          U="${{ github.event.inputs.url }}"
          [[ "$M" == "channel" && "$U" != http* ]] && U="https://www.youtube.com/$([[ "$U" == @* ]] && echo "$U" || echo "@$U")"
          echo "URL=$U" >> $GITHUB_OUTPUT
          echo "MODE=$M" >> $GITHUB_OUTPUT

                  - name: 🎯 Download & Process
          run: |
          python3 << 'PYEOF'
          import os, json, time, re, subprocess, sys, hashlib
          from pathlib import Path
          from datetime import datetime

          M = os.environ['MODE']
          U = os.environ['URL']
          T = os.environ['TYPE']
          Q = os.environ.get('QUALITY', '720')
          MX = int(os.environ.get('MAX', '10'))
          SP = int(os.environ.get('SPLIT', '50'))

          # -------------------------------------------------------------------
          # Helper functions
          # -------------------------------------------------------------------
          def safe_name(text, maxlen=40):
              safe = re.sub(r'[^\w]', '_', text)[:maxlen]
              safe = re.sub(r'_+', '_', safe).strip('_')
              if not safe:
                  safe = hashlib.md5(text.encode()).hexdigest()[:8]
              return safe

          def format_duration(sec):
              if not sec: return '?'
              return f'{sec//60}:{sec%60:02d}'

          def format_views(n):
              if not n: return 'N/A'
              try:
                  n = int(n)
                  return f'{n/1e6:.1f}M' if n >= 1e6 else f'{n/1e3:.1f}K' if n >= 1e3 else str(n)
              except:
                  return str(n)

          def get_media_info(url):
              """Get metadata using yt-dlp (works for any site)"""
              try:
                  cmd = ['yt-dlp', '--dump-json', '--no-warnings', '--no-check-certificate', url]
                  r = subprocess.run(cmd, capture_output=True, text=True, timeout=30)
                  if r.returncode != 0:
                      return None
                  data = json.loads(r.stdout)
                  channel = data.get('channel') or data.get('uploader') or data.get('uploader_id') or 'Unknown'
                  views = data.get('view_count')
                  duration = data.get('duration', 0)
                  thumbnail = data.get('thumbnail') or data.get('thumbnails', [{}])[0].get('url', '')
                  title = data.get('title', 'Untitled')[:60]
                  webpage_url = data.get('webpage_url', url)
                  return {
                      'title': title,
                      'url': webpage_url,
                      'channel': channel,
                      'duration': duration,
                      'views': views,
                      'thumbnail': thumbnail,
                      'id': data.get('id', hashlib.md5(url.encode()).hexdigest()[:8])
                  }
              except Exception as e:
                  print(f'   ⚠️ Info error: {e}')
                  return None

          def download_with_ytdlp(url, output_path, media_type, quality):
              """Download directly using yt-dlp with format selection"""
              if media_type == 'audio':
                  if quality and quality.isdigit():
                      fmt = f'bestaudio[abr<={quality}]/bestaudio'
                  else:
                      fmt = 'bestaudio'
                  ext = 'mp3'
                  postprocessors = [{'key': 'FFmpegExtractAudio', 'preferredcodec': 'mp3', 'preferredquality': quality}]
              else:
                  if quality and quality.isdigit():
                      fmt = f'bestvideo[height<={quality}]+bestaudio/best[height<={quality}]/best'
                  else:
                      fmt = 'best'
                  ext = 'mp4'
                  postprocessors = []

              cmd = [
                  'yt-dlp',
                  '-f', fmt,
                  '--no-warnings',
                  '--no-check-certificate',
                  '--output', str(output_path),
                  '--quiet'
              ]
              if postprocessors:
                  cmd += ['--extract-audio', '--audio-format', 'mp3', '--audio-quality', quality]
              cmd.append(url)

              try:
                  result = subprocess.run(cmd, capture_output=True, text=True, timeout=600)
                  if result.returncode == 0 and output_path.exists():
                      return output_path.stat().st_size
                  else:
                      print(f'   ❌ yt-dlp error: {result.stderr[:200]}')
                      return 0
              except Exception as e:
                  print(f'   ❌ Download exception: {e}')
                  return 0

          def split_file(filepath, threshold_mb):
              size_mb = filepath.stat().st_size / 1e6
              if threshold_mb > 0 and size_mb > threshold_mb:
                  print(f'   ✂️ Splitting ({size_mb:.0f}MB) into {threshold_mb}MB parts...')
                  parent = filepath.parent
                  name = filepath.name
                  subprocess.run(['zip', '-r', '-q', '-s', f'{threshold_mb}m', f'{name}.zip', name], cwd=parent, check=True)
                  filepath.unlink()
                  parts = sorted(parent.glob(f'{name}.z*'))
                  print(f'   ✅ Split into {len(parts)} parts')
                  return True
              return False

          # -------------------------------------------------------------------
          # Main logic for each mode
          # -------------------------------------------------------------------
          print(f'{"="*50}')
          print(f'🎬 {M.upper()} MODE')
          print(f'{"="*50}')

          if M == 'search':
              search_query = f'ytsearch{MX}:{U}'
              cmd = ['yt-dlp', '--flat-playlist', '--dump-json', '--no-warnings', '--no-check-certificate', search_query]
              r = subprocess.run(cmd, capture_output=True, text=True, timeout=30)
              videos = []
              for line in r.stdout.strip().split('\n'):
                  if not line: continue
                  try:
                      d = json.loads(line)
                      vid = d.get('id')
                      if not vid: continue
                      videos.append({
                          'id': vid,
                          't': d.get('title', 'Untitled')[:60],
                          'u': d.get('webpage_url', f'https://youtube.com/watch?v={vid}'),
                          'c': d.get('channel', d.get('uploader', 'Unknown')),
                          'v': format_views(d.get('view_count')),
                          'dr': d.get('duration', 0),
                          'th': d.get('thumbnail', '')
                      })
                  except:
                      continue
              if not videos:
                  print('❌ No search results')
                  sys.exit(1)

              ts = datetime.now().strftime('%Y-%m-%d_%H-%M-%S')
              Path('./searches').mkdir(exist_ok=True)
              qs = safe_name(U, 30)
              f = f'searches/{qs}_{ts}.md'
              m = (f'# 🔍 Search: {U}\n\n**{datetime.now():%Y-%m-%d %H:%M}** | **{len(videos)} results**\n\n'
                   f'| # | Thumbnail | Title | Channel | Views | Duration |\n'
                   f'|---|-----------|-------|---------|-------|----------|\n')
              for i, x in enumerate(videos, 1):
                  m += f'| {i} | [<img src="{x["th"]}" width="80">]({x["u"]}) | [{x["t"]}]({x["u"]}) | {x["c"][:20]} | {x["v"]} | {x["dr"]//60}m |\n'
              m += '\n---\n\n'
              for i, x in enumerate(videos, 1):
                  m += (f'### {i}. {x["t"]}\n\n<img src="{x["th"]}" width="640">\n\n'
                       f'| Property | Value |\n|----------|-------|\n'
                       f'| Channel | {x["c"]} |\n| Duration | {x["dr"]//60}m |\n'
                       f'| Views | {x["v"]} |\n| ID | `{x["id"]}` |\n| URL | {x["u"]} |\n\n---\n\n')
              Path(f).write_text(m)
              print(f'✅ Search index saved: {f}')

          elif M in ('playlist', 'channel'):
              cmd = ['yt-dlp', '--flat-playlist', '--dump-json', '--no-warnings', '--no-check-certificate']
              if MX > 0:
                  cmd += ['--playlist-end', str(MX)]
              cmd.append(U)

              r = subprocess.run(cmd, capture_output=True, text=True, timeout=60)
              videos = []
              for line in r.stdout.strip().split('\n'):
                  if not line: continue
                  try:
                      d = json.loads(line)
                      url = d.get('webpage_url') or f"https://youtube.com/watch?v={d.get('id')}" if d.get('id') else None
                      if not url: continue
                      info = get_media_info(url)
                      if not info:
                          info = {
                              'title': d.get('title', 'Untitled'),
                              'url': url,
                              'channel': d.get('channel', d.get('uploader', 'Unknown')),
                              'duration': d.get('duration', 0),
                              'views': d.get('view_count'),
                              'thumbnail': d.get('thumbnail', ''),
                              'id': d.get('id', hashlib.md5(url.encode()).hexdigest()[:8])
                          }
                      videos.append({
                          'id': info['id'],
                          't': info['title'][:60],
                          'u': info['url'],
                          'c': info['channel'],
                          'v': format_views(info['views']),
                          'dr': info['duration'],
                          'th': info['thumbnail']
                      })
                  except Exception as e:
                      print(f'   ⚠️ Skip line: {e}')
                      continue

              if not videos:
                  print('❌ No videos found in playlist/channel')
                  sys.exit(1)

              first_channel = safe_name(videos[0]['c'], 30) if videos[0]['c'] != 'Unknown' else 'playlist'
              cd = Path(f'downloads/{first_channel}_videos')
              cd.mkdir(parents=True, exist_ok=True)

              ts = datetime.now().strftime('%Y-%m-%d_%H-%M-%S')
              inf = cd / 'info'
              inf.mkdir(exist_ok=True)
              idxf = f'playlists/{first_channel}_{ts}.md'
              Path('./playlists').mkdir(exist_ok=True)

              m = (f'# 📺 {first_channel}\n\n**{datetime.now():%Y-%m-%d %H:%M}** | **{len(videos)} videos**\n\n'
                   f'| # | Thumbnail | Title | Duration | Views |\n'
                   f'|---|-----------|-------|----------|-------|\n')
              for i, x in enumerate(videos, 1):
                  dur_str = f'{x["dr"]//60}:{x["dr"]%60:02d}' if x['dr'] else '?'
                  m += f'| {i} | [<img src="{x["th"]}" width="80">]({x["u"]}) | [{x["t"]}]({x["u"]}) | {dur_str} | {x["v"]} |\n'

              m += '\n---\n\n## 📝 Details\n\n'
              for i, x in enumerate(videos, 1):
                  sn = f'v{i:03d}_{x["id"]}'
                  dur_str = f'{x["dr"]//60} minutes' if x['dr'] else 'Unknown'
                  info_md = (f'# 🎬 {x["t"]}\n\n'
                            f'![Thumbnail]({x["th"]})\n\n'
                            f'## Info\n\n'
                            f'| Property | Value |\n|----------|-------|\n'
                            f'| **Channel** | {x["c"]} |\n'
                            f'| **Duration** | {dur_str} |\n'
                            f'| **Views** | {x["v"]} |\n'
                            f'| **Video ID** | `{x["id"]}` |\n'
                            f'| **URL** | {x["u"]} |\n\n'
                            f'## Thumbnail\n\n'
                            f'<img src="{x["th"]}" width="640">\n\n'
                            f'---\n*Downloaded: {datetime.now():%Y-%m-%d %H:%M}*')
                  (inf / f'{sn}.md').write_text(info_md)
                  m += (f'### {i}. {x["t"]}\n\n'
                       f'![Thumbnail]({x["th"]})\n\n'
                       f'- **{dur_str}** | **{x["v"]}** views | **{x["c"]}**\n'
                       f'- 📄 [info/{sn}.md](info/{sn}.md)\n\n---\n\n')
              Path(idxf).write_text(m)
              print(f'📄 Index: {idxf}')

              ok, fl = [], []
              for i, vid_info in enumerate(videos, 1):
                  print(f'\n📥 [{i}/{len(videos)}] {vid_info["t"]}')
                  ext = 'mp3' if T == 'audio' else 'mp4'
                  out_path = cd / f'v{i:03d}_{vid_info["id"]}.{ext}'
                  size = download_with_ytdlp(vid_info['u'], out_path, T, Q)
                  if size:
                      print(f'   ✅ Downloaded ({size/1e6:.1f}MB)')
                      split_file(out_path, SP)
                      ok.append(vid_info['t'])
                  else:
                      print(f'   ❌ Download failed')
                      fl.append(vid_info['t'])
                  if i < len(videos):
                      print('   ⏳ Waiting 2 seconds...')
                      time.sleep(2)

              print(f'\n{"="*50}')
              print(f'📊 {len(ok)}/{len(videos)} downloaded successfully')
              if fl:
                  print(f'❌ Failed: {fl}')
              print(f'{"="*50}')

          else:  # single video mode
              info = get_media_info(U)
              if not info:
                  print('❌ Could not fetch video info')
                  sys.exit(1)

              channel_name = safe_name(info['channel'], 30) if info['channel'] != 'Unknown' else 'video'
              cd = Path(f'downloads/{channel_name}_videos')
              cd.mkdir(parents=True, exist_ok=True)

              ext = 'mp3' if T == 'audio' else 'mp4'
              out_path = cd / f'v_{info["id"]}.{ext}'
              size = download_with_ytdlp(U, out_path, T, Q)
              if size:
                  print(f'✅ Saved to {channel_name}_videos/ ({size/1e6:.1f}MB)')
                  split_file(out_path, SP)
              else:
                  print('❌ Download failed')
                  sys.exit(1)

          PYEOF
